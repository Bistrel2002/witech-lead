version: '3.8'

services:
  # 1. Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: witech-postgres
    restart: always
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_secure_password
      POSTGRES_DB: witech_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. HashiCorp Vault (Centralized Secret Management)
  vault:
    image: hashicorp/vault:latest
    container_name: witech-vault
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: witech-vault-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev

  # 3. MinIO (Local S3-compatible Archive Storage)
  minio:
    image: minio/minio:latest
    container_name: witech-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: backup_admin
      MINIO_ROOT_PASSWORD: minio_secure_password
    volumes:
      - minio_data:/data

  # 4. Backend (Express Node.js API + Python Playwright Scraper)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: witech-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://crm_admin:crm_secure_password@postgres:5432/witech_crm
      FRENCH_DB_URL: postgresql://crm_admin:crm_secure_password@postgres:5432/witech_crm # Can point to external DB in prod
      JWT_SECRET: witech-crm-token-key-2026
      ADMIN_PORTAL_PASSWORD: admin123
      TEAM_PORTAL_PASSWORD: team123
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: witech-vault-token
      VAULT_SECRET_PATH: witech-crm
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: witech-backups
      S3_ACCESS_KEY_ID: backup_admin
      S3_SECRET_ACCESS_KEY: minio_secure_password
      S3_REGION: us-east-1
      VITE_MOCK_AUTH: "false"
    depends_on:
      - postgres
      - vault
      - minio

  # 5. Frontend (React SPA Served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: witech-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
